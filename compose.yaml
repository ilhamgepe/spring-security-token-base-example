services:
  postgres:
    image: postgres:18.3
    environment:
      - POSTGRES_DB=bayr
      - POSTGRES_PASSWORD=root
      - POSTGRES_USER=root
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d bayr" ]
      interval: 10s
      timeout: 5s
      retries: 5


  redis:
    image: redis:latest
    environment:
      - REDIS_PASSWORD=root
    command: ["--requirepass", "root"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "root", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  bayr-network:

volumes:
  postgres-data:
  redis-data:
